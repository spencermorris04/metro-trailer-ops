services:
  postgres:
    image: postgres:16-alpine
    container_name: metro-trailer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: metro_trailer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metro_trailer"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - metro_trailer_postgres:/var/lib/postgresql/data

volumes:
  metro_trailer_postgres:
